name: Python Tests

on:
  push:
  pull_request:

jobs:
  test-file-integrity-monitor:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: file-integrity-monitor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest